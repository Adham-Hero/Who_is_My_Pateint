<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الطبي الشامل | السجل الرقمي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow-x: hidden; 
            background: #05080a; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        /* تحسين تأثير الزجاج */
        .report-card { 
            background: rgba(11, 15, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; 
            border: 1px solid rgba(13, 202, 240, 0.25); 
            padding: 45px; 
            margin: 40px auto; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
        }

        .section-title { 
            border-right: 5px solid #0dcaf0; 
            padding-right: 15px; 
            margin-bottom: 25px; 
            color: #0dcaf0; 
            text-transform: uppercase;
            font-weight: 700;
        }

        .data-label { color: #6c757d; font-size: 0.8rem; font-weight: bold; }
        .data-value { font-size: 1.15rem; color: #f8f9fa; display: block; margin-top: 4px; }
        
        .medical-badge { 
            background: rgba(13, 202, 240, 0.1); 
            color: #0dcaf0; 
            border: 1px solid rgba(13, 202, 240, 0.3); 
            padding: 5px 15px; 
            border-radius: 12px; 
            display: inline-block; 
            margin: 4px; 
            font-size: 0.85rem;
        }

        .med-list-item { 
            background: rgba(255,255,255,0.05); 
            margin-bottom: 10px; 
            padding: 15px; 
            border-radius: 12px; 
            border-right: 4px solid #0dcaf0; 
            transition: 0.3s;
        }
        .med-list-item:hover { background: rgba(13, 202, 240, 0.1); }

        .btn-custom {
            border: 2px solid #0dcaf0;
            color: #0dcaf0;
            padding: 12px 35px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            background: transparent;
        }
        .btn-custom:hover {
            background: #0dcaf0;
            color: #000;
            box-shadow: 0 0 25px rgba(13, 202, 240, 0.5);
        }

        @media print {
            #bg-canvas, .no-print { display: none !important; }
            .report-card { background: white !important; color: black !important; border: 2px solid #000 !important; width: 100% !important; max-width: 100% !important; }
            .section-title { color: #000 !important; border-right: 5px solid #000 !important; }
            .medical-badge { border: 1px solid #000 !important; color: #000 !important; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container py-4">
        <div class="report-card">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="fw-bold text-info">السجل الطبي الرقمي</h1>
                    <p class="text-white-50 small">كود التشفير البيومتري النشط: <span id="p-id-display">--</span></p>
                </div>
                <div class="text-end">
                    <span id="report-date" class="badge bg-dark border border-info px-3 py-2"></span>
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-12"><h4 class="section-title">البيانات الأساسية</h4></div>
                <div class="col-md-4 mb-3"><span class="data-label">الاسم</span><span class="data-value" id="p-name">---</span></div>
                <div class="col-md-4 mb-3"><span class="data-label">الرقم القومي</span><span class="data-value" id="p-id">---</span></div>
                <div class="col-md-4 mb-3"><span class="data-label">العمر</span><span class="data-value" id="p-age">---</span></div>
                <div class="col-md-4 mb-3"><span class="data-label">الهاتف</span><span class="data-value" id="p-phone">---</span></div>
                <div class="col-md-8 mb-3"><span class="data-label">العنوان المسجل</span><span class="data-value" id="p-address">---</span></div>
            </div>

            <div class="row mb-5">
                <div class="col-md-7">
                    <h4 class="section-title">التاريخ الجراحي والمرضي</h4>
                    <div id="p-surgeries" class="mb-4">---</div>
                    <h4 class="section-title">الأمراض المزمنة</h4>
                    <div id="p-chronic">---</div>
                </div>
                <div class="col-md-5">
                    <h4 class="section-title">الأدوية النشطة</h4>
                    <div id="p-meds">---</div>
                </div>
            </div>

            <div class="row align-items-center">
                <div class="col-md-8">
                    <h4 class="section-title">سجل العائلة الجيني</h4>
                    <p id="p-family-history" class="text-white-50">---</p>
                    <p class="small">عدد الأقارب المسجلين: <span id="p-family-count" class="text-info">0</span></p>
                </div>
                <div class="col-md-4 text-center">
                    <div class="p-4 rounded-4" style="background: rgba(13, 202, 240, 0.05); border: 1px dashed #0dcaf0;">
                        <span class="data-label">مؤشر الزيارات الإجمالي</span>
                        <div class="display-3 fw-bold text-info" id="p-visits">0</div>
                    </div>
                </div>
            </div>

            <div class="mt-5 text-center no-print">
                <button class="btn btn-custom me-2" onclick="window.print()">تصدير كـ PDF</button>
                <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4">رجوع للبحث</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="patient_report.js"></script>
</body>
</html>
