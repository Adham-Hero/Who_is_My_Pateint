<script>
    if (localStorage.getItem('userRole') !== 'admin') {
        alert("⚠️ غير مسموح لك بدخول هذه الصفحة!");
        window.location.href = 'index.html'; 
    }
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        /* إضافة ستايل لزر الخروج */
        .btn-logout { 
            position: absolute; top: 20px; left: 20px; 
            border: 1px solid #ff4d4d; color: #ff4d4d; 
            background: transparent; padding: 5px 15px; border-radius: 10px;
        }
        .btn-logout:hover { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<button class="btn-logout" onclick="logout()">🚪 تسجيل الخروج</button>

<div class="container mt-4">
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 1. كود الخلفية THREE.JS (كما هو لديك) ---
    // ... [انسخ كود الـ InitStars الخاص بك هنا] ...

    // --- 2. كود إدارة البيانات (التعديلات هنا) ---
    
    // التعديل 1: رابط نسبي ليعمل على Vercel
    const API_URL = '/api'; 
    const reportModal = new bootstrap.Modal(document.getElementById('reportModal'));

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    async function loadPatients() {
        try {
            const res = await fetch(`${API_URL}/patients`);
            const result = await res.json();
            const tbody = document.getElementById('patientsTableBody');
            tbody.innerHTML = '';

            if (result.data && result.data.length > 0) {
                result.data.forEach(p => {
                    // تحويل البيانات لنص بأمان لاستخدامها في الزر
                    const pData = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div class="fw-bold">${p.name}</div>
                                <small class="text-white-50">${p.address || 'لا يوجد عنوان'}</small>
                            </td>
                            <td><code>${p.nationalId}</code></td>
                            <td>${p.phone || '---'}</td>
                            <td>${p.age} سنة</td>
                            <td>
                                <button class="btn-view" onclick="viewPatientReport('${pData}')">👁️ استعراض البيانات</button>
                                <span class="btn-delete" onclick="deletePatient('${p.nationalId}')">🗑️ حذف</span>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-white-50">لا يوجد مرضى مسجلين حالياً</td></tr>';
            }
        } catch (e) { 
            console.error("Error loading:", e); 
        }
    }

    // تعديل دالة العرض لتعامل مع البيانات المشفرة (لتجنب أخطاء العلامات التنصيص)
    function viewPatientReport(encodedData) {
        const p = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
        
        document.getElementById('r-name').innerText = p.name;
        document.getElementById('r-id').innerText = p.nationalId;
        document.getElementById('r-phone').innerText = p.phone || '---';
        document.getElementById('r-age').innerText = p.age + " سنة";
        document.getElementById('r-address').innerText = p.address || '---';
        document.getElementById('r-family').innerText = p.familyHistory || 'لا يوجد سجل عائلي مسجل.';

        const surgContainer = document.getElementById('r-surgeries');
        const surgeries = p.medicalHistory?.surgeries || [];
        surgContainer.innerHTML = surgeries.length > 0 && surgeries[0] !== "" 
            ? surgeries.map(s => `<span class="medical-badge">${s}</span>`).join('') 
            : '<span class="text-white-50 small">لا يوجد عمليات مسجلة</span>';

        const medsContainer = document.getElementById('r-meds');
        const medications = p.medicalHistory?.medications || [];
        medsContainer.innerHTML = medications.length > 0 && medications[0] !== "" 
            ? medications.join(' ، ') 
            : 'لا يوجد أدوية مسجلة.';

        reportModal.show();
    }

    // كود الإرسال (Post) كما هو مع تعديل بسيط في معالجة الاستجابة
    document.getElementById('addPatientForm').onsubmit = async (e) => {
        e.preventDefault();
        
        // ... نفس كود استخراج البيانات (patientData) من مدخلاتك ...

        try {
            const res = await fetch(`${API_URL}/patients`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(patientData)
            });

            if (res.ok) {
                alert('✅ تم حفظ السجل بنجاح!');
                loadPatients();
                e.target.reset();
            } else {
                const err = await res.json();
                alert('❌ خطأ: ' + err.message);
            }
        } catch (err) {
            alert('❌ تعذر الاتصال بالسيرفر');
        }
    };

    async function deletePatient(id) {
        if (confirm('⚠️ هل أنت متأكد من الحذف؟')) {
            try {
                const res = await fetch(`${API_URL}/patient/${id}`, { method: 'DELETE' });
                if (res.ok) loadPatients();
            } catch (e) { alert("خطأ في الحذف"); }
        }
    }

    loadPatients();
</script>
</body>
</html>
