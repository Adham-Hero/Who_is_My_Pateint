<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة السجلات الطبية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #05080a; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        .admin-card { 
            background: rgba(11, 15, 20, 0.8);
            backdrop-filter: blur(15px); 
            border-radius: 20px; 
            padding: 30px; 
            border: 1px solid rgba(13, 202, 240, 0.2); 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-label { color: #0dcaf0; font-weight: 500; }
        .form-control { background: rgba(0,0,0,0.4); border: 1px solid #444; color: #fff; border-radius: 10px; }
        .form-control:focus { background: rgba(0,0,0,0.6); color: #fff; border-color: #0dcaf0; box-shadow: 0 0 10px rgba(13, 202, 240, 0.3); }
        
        .section-divider { 
            border-bottom: 1px solid rgba(13, 202, 240, 0.2); 
            margin: 25px 0 15px; 
            padding-bottom: 5px; 
            color: #8899a6; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .table { color: #fff !important; border-color: #333; }
        thead { background: rgba(13, 202, 240, 0.1); color: #0dcaf0; }
        
        .btn-info { background: #0dcaf0; border: none; font-weight: bold; color: #000; transition: 0.3s; }
        .btn-info:hover { background: #0bb5d9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(13, 202, 240, 0.4); }
        .btn-info:disabled { background: #555; color: #aaa; transform: none; }

        .btn-view { 
            color: #0dcaf0; 
            border: 1px solid #0dcaf0; 
            background: transparent; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-view:hover { background: #0dcaf0; color: #000; }

        .btn-delete { color: #ff4d4d; cursor: pointer; transition: 0.3s; padding: 5px 10px; border-radius: 5px; margin-right: 10px; text-decoration: none; }
        .btn-delete:hover { background: rgba(255, 77, 77, 0.1); color: #ff0000; }

        /* Modal Styling */
        .modal-content {
            background: rgba(11, 15, 20, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid #0dcaf0;
            border-radius: 25px;
            color: #fff;
        }
        .report-section-title { color: #0dcaf0; border-right: 4px solid #0dcaf0; padding-right: 10px; margin-bottom: 15px; font-weight: bold; }
        .data-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .medical-badge { background: rgba(13, 202, 240, 0.1); color: #0dcaf0; border: 1px solid rgba(13, 202, 240, 0.3); padding: 3px 10px; border-radius: 50px; margin: 2px; display: inline-block; font-size: 0.8rem; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container mt-4">
    <div class="admin-card">
        <h2 class="text-info mb-4 text-center">🔐 إدارة السجلات الطبية</h2>
        <form id="addPatientForm">
            <div class="section-divider">المعلومات الشخصية</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">الاسم الكامل</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">الرقم القومي (14 رقم)</label>
                    <input type="text" id="nationalId" class="form-control" maxlength="14" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>
                <div class="col-md-2">
                    <label class="form-label">العمر</label>
                    <input type="number" id="age" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="text" id="phone" class="form-control">
                </div>
            </div>

            <div class="section-divider mt-4">التاريخ الطبي</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">العمليات (افصل بفاصلة ,)</label>
                    <input type="text" id="surgeries" class="form-control" placeholder="مثال: قلب مفتوح, مرارة">
                </div>
                <div class="col-md-6">
                    <label class="form-label">الأمراض المزمنة (افصل بفاصلة ,)</label>
                    <input type="text" id="chronic" class="form-control" placeholder="مثال: ضغط, سكري">
                </div>
                <div class="col-md-12">
                    <label class="form-label">الأدوية (افصل بفاصلة ,)</label>
                    <input type="text" id="meds" class="form-control">
                </div>
            </div>

            <div class="mt-4 text-center">
                <button type="submit" id="submitBtn" class="btn btn-info px-5">حفظ سجل المريض</button>
            </div>
        </form>
    </div>

    <div class="admin-card">
        <h3 class="text-info mb-4">📑 السجلات الحالية</h3>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الرقم القومي</th>
                        <th>العمر</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="patientsTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="reportModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title text-info">👁️ مراجعة الملف الطبي</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="data-box">
                            <h6 class="report-section-title">البيانات الشخصية</h6>
                            <p>الاسم: <span id="r-name" class="text-info"></span></p>
                            <p>الرقم القومي: <span id="r-id" class="text-info"></span></p>
                            <p>الهاتف: <span id="r-phone" class="text-info"></span></p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="data-box">
                            <h6 class="report-section-title">الحالة الطبية</h6>
                            <p>العمر: <span id="r-age" class="text-info"></span></p>
                            <div id="r-surgeries" class="mb-2"></div>
                            <div id="r-meds"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 1. الخلفية ---
    let scene = new THREE.Scene(), 
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000),
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    let starGeo = new THREE.BufferGeometry(), posArr = new Float32Array(5000 * 3);
    for(let i=0; i<15000; i++) posArr[i] = (Math.random() - 0.5) * 10;
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.005, color: 0x0dcaf0 }));
    scene.add(stars); camera.position.z = 2;
    function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.001; renderer.render(scene, camera); }
    animate();

    // --- 2. إدارة البيانات ---
    const API_URL = '/api'; // الرابط النسبي للعمل على Vercel
    const modal = new bootstrap.Modal(document.getElementById('reportModal'));

    async function loadPatients() {
        try {
            const res = await fetch(`${API_URL}/patients`);
            const json = await res.json();
            const tbody = document.getElementById('patientsTableBody');
            tbody.innerHTML = json.data.length ? '' : '<tr><td colspan="4" class="text-center">لا يوجد سجلات</td></tr>';

            json.data.forEach(p => {
                // تحويل المريض لـ String آمن للاستخدام في الـ HTML
                const pString = JSON.stringify(p).replace(/"/g, '&quot;');
                tbody.innerHTML += `
                    <tr>
                        <td>${p.name}</td>
                        <td><code>${p.nationalId}</code></td>
                        <td>${p.age} سنة</td>
                        <td>
                            <button class="btn-view" onclick='viewReport(${pString})'>عرض</button>
                            <span class="btn-delete" onclick="deletePatient('${p.nationalId}')">حذف</span>
                        </td>
                    </tr>`;
            });
        } catch (e) { console.log("Load Error"); }
    }

    function viewReport(p) {
        document.getElementById('r-name').innerText = p.name;
        document.getElementById('r-id').innerText = p.nationalId;
        document.getElementById('r-phone').innerText = p.phone || 'غير مسجل';
        document.getElementById('r-age').innerText = p.age + ' سنة';
        
        const sDiv = document.getElementById('r-surgeries');
        sDiv.innerHTML = '<small class="text-white-50">العمليات:</small><br>';
        p.medicalHistory.surgeries.forEach(s => s && (sDiv.innerHTML += `<span class="medical-badge">${s}</span>`));
        
        modal.show();
    }

    document.getElementById('addPatientForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;

        const getList = (id) => document.getElementById(id).value.split(',').map(i => i.trim()).filter(i => i !== "");

        const data = {
            name: document.getElementById('name').value,
            nationalId: document.getElementById('nationalId').value,
            age: parseInt(document.getElementById('age').value),
            phone: document.getElementById('phone').value,
            medicalHistory: {
                surgeries: getList('surgeries'),
                chronicDiseases: getList('chronic'),
                medications: getList('meds')
            }
        };

        try {
            const res = await fetch(`${API_URL}/patients`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("✅ تم الحفظ");
                e.target.reset();
                loadPatients();
            } else {
                const err = await res.json();
                alert("❌ خطأ: " + err.message);
            }
        } finally { btn.disabled = false; }
    };

    async function deletePatient(id) {
        if(confirm("هل أنت متأكد من حذف هذا الملف؟")) {
            await fetch(`${API_URL}/patient/${id}`, { method: 'DELETE' });
            loadPatients();
        }
    }

    loadPatients();
</script>
</body>
</html>
