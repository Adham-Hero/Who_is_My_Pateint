<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is my patient - البحث الرقمي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* تحسينات التصميم لدمج الـ 3D مع الواجهة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* منع التمرير لضمان ثبات الخلفية */
            background-color: #05080a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية Three.js */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* خلف الواجهة */
        }

        /* الطبقة العلوية للواجهة */
        .ui-overlay {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            background: rgba(11, 15, 20, 0.4);
            backdrop-filter: blur(15px); /* تأثير الزجاج الضبابي */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(13, 202, 240, 0.2);
            max-width: 550px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease-out; /* لتأثير الـ Tilt */
        }

        .search-title {
            font-weight: 800;
            color: #0dcaf0;
            text-shadow: 0 0 20px rgba(13, 202, 240, 0.5);
        }

        .form-control {
            text-align: center;
            letter-spacing: 3px;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            border-radius: 10px 0 0 10px !important;
        }

        .form-control:focus {
            border-color: #0dcaf0 !important;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.3) !important;
        }

        .btn-custom {
            background: #0dcaf0;
            color: #000;
            font-weight: bold;
            border-radius: 0 10px 10px 0 !important;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0bb5d9;
            transform: scale(1.05);
        }

        #error-popup {
            display: none; 
            position: fixed; 
            top: 25px; 
            left: 25px;
            z-index: 9999;
            min-width: 320px;
            border-radius: 15px;
        }

        .loading-spinner {
            display: none;
            color: #0dcaf0;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="error-popup" class="alert alert-warning alert-dismissible fade show shadow-lg" role="alert">
    <strong id="error-title">تنبيه نظامي!</strong> 
    <br>
    <span id="error-message">الرقم القومي يجب أن يكون 14 رقماً.</span>
    <button type="button" class="btn-close" onclick="closeError()" aria-label="إغلاق" style="left: auto; right: 10px;"></button>
</div>

<div class="ui-overlay">
    <div class="search-container text-center" id="tilt-container">
        <h2 class="search-title mb-4">بوابة السجلات الطبية</h2>
        <p class="text-white-50 mb-4">أدخل الرقم القومي المكون من 14 رقماً للتحقق من هوية المريض وسجله.</p>
        
        <div class="input-group input-group-lg mb-2" dir="ltr">
            <button class="btn btn-custom px-4" type="button" onclick="validateSearch()">
                بـحـث
            </button>
            <input type="text" 
                   id="patientID" 
                   class="form-control" 
                   placeholder="29501011234567" 
                   maxlength="14"
                   autocomplete="off"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div id="loading-spinner" class="loading-spinner">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">جاري البحث في قاعدة البيانات الرقمية...</span>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/fonts/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

<script src="index.js"></script>

<script>
    // تشغيل البحث عند الضغط على Enter
    document.getElementById('patientID').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            validateSearch();
        }
    });

    // دالة إغلاق رسالة الخطأ يدوياً
    function closeError() {
        document.getElementById('error-popup').style.display = 'none';
    }
</script>

</body>
</html>
