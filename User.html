<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is my patient - البحث الرقمي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الـ 3D في الخلفية */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .ui-overlay {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            background: rgba(11, 15, 20, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(13, 202, 240, 0.2);
            max-width: 500px;
            width: 95%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
        }

        .search-title {
            font-weight: 800;
            color: #0dcaf0;
            text-shadow: 0 0 15px rgba(13, 202, 240, 0.4);
        }

        .form-control {
            text-align: center;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid #444 !important;
            color: #fff !important;
        }

        .btn-custom {
            background: #0dcaf0;
            color: #000;
            font-weight: bold;
            border-radius: 0 10px 10px 0 !important;
            border: none;
        }

        #error-popup {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 20px;
            z-index: 9999;
            min-width: 300px;
            text-align: right;
        }

        .loading-spinner {
            display: none;
            color: #0dcaf0;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="error-popup" class="alert alert-warning alert-dismissible fade show shadow-lg" role="alert">
    <strong>تنبيه!</strong> 
    <span id="error-message">يجب إدخال 14 رقماً صحيحاً.</span>
    <button type="button" class="btn-close" onclick="closeError()" aria-label="إغلاق" style="left: auto; right: 0;"></button>
</div>

<div class="ui-overlay">
    <div class="search-container text-center" id="tilt-container">
        <h2 class="search-title mb-4">قاعدة بيانات المرضى</h2>
        <p class="text-white-50 mb-4">يرجى إدخال الرقم القومي المكون من 14 رقماً.</p>
        
        <div class="input-group input-group-lg mb-3" dir="ltr">
            <button class="btn btn-custom px-4" type="button" onclick="validateSearch()">بحث</button>
            <input type="text" id="patientID" class="form-control" placeholder="29501011234567" maxlength="14" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div id="loading-spinner" class="loading-spinner">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span>جاري البحث في السجلات...</span>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/fonts/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
<script src="index.js"></script>

<script>
    // إغلاق التنبيه
    function closeError() {
        document.getElementById('error-popup').style.display = 'none';
    }

    // البحث بـ Enter
    document.getElementById('patientID').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') validateSearch();
    });

    // --- GLOBAL VARIABLES ---
let scene, camera, renderer, textMesh, starSystem;
const clock = new THREE.Clock();

function initThree() {
    // 1. Scene Setup
    scene = new THREE.Scene();
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 25; 

    // 2. Renderer Setup
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    const container = document.getElementById('canvas-container');
    if (container) container.appendChild(renderer.domElement);

    // 3. Lighting
    const keyLight = new THREE.DirectionalLight(0xffffff, 1);
    keyLight.position.set(5, 5, 15);
    scene.add(keyLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    
    const pointLight = new THREE.PointLight(0x0dcaf0, 1.8, 100);
    pointLight.position.set(-15, -10, 5);
    scene.add(pointLight);

    // 4. 3D Text Creation
    const loader = new THREE.FontLoader();
    loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', function (font) {
        const geometry = new THREE.TextGeometry('Who is my patient?', {
            font: font,
            size: 1.5,
            height: 0.5,
            curveSegments: 12,
            bevelEnabled: true,
            bevelThickness: 0.06,
            bevelSize: 0.04,
            bevelSegments: 5
        });
        
        geometry.center();
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xffffff, 
            specular: 0x0dcaf0,
            shininess: 150
        });
        
        textMesh = new THREE.Mesh(geometry, material);
        textMesh.position.y = 10; 
        scene.add(textMesh);
    });

    // 5. Starfield Effect
    const starCount = 12000;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) {
        starPositions[i] = (Math.random() - 0.5) * 250;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

    const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.12,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
    });

    starSystem = new THREE.Points(starGeometry, starMaterial);
    scene.add(starSystem);
}

function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    if (textMesh) {
        textMesh.rotation.y += 0.003;
        textMesh.position.y = 10 + Math.sin(elapsedTime * 0.5) * 1;
    }

    if (starSystem) {
        starSystem.rotation.y += 0.0004;
        starSystem.rotation.x += 0.0001;
    }

    renderer.render(scene, camera);
}

// --- UI INTERACTION: TILT EFFECT ---
const tiltContainer = document.getElementById('tilt-container');
if (tiltContainer) {
    tiltContainer.addEventListener('mousemove', (e) => {
        const rect = tiltContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const maxTilt = 12; 
        const rotateX = ((centerY - y) / centerY) * maxTilt;
        const rotateY = ((x - centerX) / centerX) * maxTilt;
        
        tiltContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    tiltContainer.addEventListener('mouseleave', () => {
        tiltContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
}

// --- SEARCH VALIDATION & API CALL ---
async function validateSearch() {
    const input = document.getElementById('patientID').value.trim();
    const spinner = document.getElementById('loading-spinner');
    
    if (input.length === 14 && /^\d+$/.test(input)) {
        if(spinner) spinner.style.display = 'block';
        try {
            // المسار النسبي ليعمل على Vercel
            const response = await fetch(`/api/patients`);
            const result = await response.json();
            
            if (result.success) {
                const patient = result.data.find(p => p.nationalId === input);
                if (patient) {
                    localStorage.setItem('tempPatientData', JSON.stringify(patient));
                    window.location.href = "patient_report.html"; 
                } else {
                    showError("هذا الرقم غير مسجل في النظام.");
                }
            }
        } catch (err) {
            showError("حدث خطأ في الاتصال بالسيرفر.");
        } finally {
            if(spinner) spinner.style.display = 'none';
        }
    } else {
        showError("يرجى إدخال 14 رقماً صحيحاً.");
    }
}

function showError(msg) {
    const errorPopup = document.getElementById('error-popup');
    const errorText = document.getElementById('error-message');
    if (errorPopup && errorText) {
        errorText.innerText = msg;
        errorPopup.style.display = 'block';
        setTimeout(() => { errorPopup.style.display = 'none'; }, 4000);
    }
}

// --- EVENT LISTENERS ---
window.addEventListener('resize', () => {
    if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});

// تشغيل النظام
initThree();
animate();

</script>

</body>
</html>
