<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is my patient - البحث الرقمي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الـ 3D في الخلفية */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .ui-overlay {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        .search-container {
            background: rgba(11, 15, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(13, 202, 240, 0.15);
            max-width: 500px;
            width: 95%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-title {
            font-weight: 800;
            color: #0dcaf0;
            text-shadow: 0 0 20px rgba(13, 202, 240, 0.5);
            margin-bottom: 1.5rem;
        }

        .form-control {
            text-align: center;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            border-radius: 10px 0 0 10px !important;
        }

        .form-control:focus {
            border-color: #0dcaf0 !important;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.3) !important;
        }

        .btn-custom {
            background: #0dcaf0;
            color: #000;
            font-weight: bold;
            border-radius: 0 10px 10px 0 !important;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background: #0bb5d9;
            transform: scale(1.02);
        }

        #error-popup {
            display: none; 
            position: fixed; 
            top: 25px; 
            left: 25px;
            z-index: 9999;
            min-width: 320px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .loading-spinner {
            display: none;
            color: #0dcaf0;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="error-popup" class="alert alert-warning alert-dismissible fade show shadow-lg" role="alert">
    <strong>تنبيه نظامي!</strong> 
    <br>
    <span id="error-message">الرقم القومي يجب أن يكون 14 رقماً.</span>
    <button type="button" class="btn-close" onclick="closeError()" aria-label="إغلاق" style="left: auto; right: 10px;"></button>
</div>

<div class="ui-overlay">
    <div class="search-container text-center" id="tilt-container">
        <h2 class="search-title">قاعدة بيانات المرضى</h2>
        <p class="text-white-50 mb-4">أدخل الرقم القومي المكون من 14 رقماً للتحقق من السجل الطبي.</p>
        
        <div class="input-group input-group-lg mb-2" dir="ltr">
            <button class="btn btn-custom px-4" type="button" onclick="validateSearch()">بـحـث</button>
            <input type="text" id="patientID" class="form-control" placeholder="29501011234567" maxlength="14" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div id="loading-spinner" class="loading-spinner">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">جاري فحص السجلات الرقمية...</span>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/fonts/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

<script>
// --- GLOBAL VARIABLES ---
let scene, camera, renderer, textMesh, starSystem;
const clock = new THREE.Clock();

// --- THREE.JS INITIALIZATION ---
function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 25; 

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    const container = document.getElementById('canvas-container');
    if (container) container.appendChild(renderer.domElement);

    // Lighting
    const keyLight = new THREE.DirectionalLight(0xffffff, 1);
    keyLight.position.set(5, 5, 15);
    scene.add(keyLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    
    const pointLight = new THREE.PointLight(0x0dcaf0, 1.5, 100);
    pointLight.position.set(-15, -10, 5);
    scene.add(pointLight);

    // 3D Text
    const loader = new THREE.FontLoader();
    loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', function (font) {
        const geometry = new THREE.TextGeometry('Who is my patient?', {
            font: font,
            size: 1.5,
            height: 0.5,
            curveSegments: 12,
            bevelEnabled: true,
            bevelThickness: 0.05,
            bevelSize: 0.03
        });
        geometry.center();
        const material = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0x0dcaf0, shininess: 100 });
        textMesh = new THREE.Mesh(geometry, material);
        textMesh.position.y = 10; 
        scene.add(textMesh);
    });

    // Starfield
    const starCount = 10000;
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) {
        starPositions[i] = (Math.random() - 0.5) * 200;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6 });
    starSystem = new THREE.Points(starGeometry, starMaterial);
    scene.add(starSystem);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    if (textMesh) {
        textMesh.rotation.y += 0.003;
        textMesh.position.y = 10 + Math.sin(elapsedTime * 0.5) * 1;
    }
    if (starSystem) {
        starSystem.rotation.y += 0.0003;
    }
    renderer.render(scene, camera);
}

// --- UI INTERACTIONS ---
const tiltContainer = document.getElementById('tilt-container');
if (tiltContainer) {
    tiltContainer.addEventListener('mousemove', (e) => {
        const rect = tiltContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((centerY - y) / centerY) * 10;
        const rotateY = ((x - centerX) / centerX) * 10;
        tiltContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    tiltContainer.addEventListener('mouseleave', () => {
        tiltContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });
}

// --- CORE FUNCTIONALITY ---
async function validateSearch() {
    const input = document.getElementById('patientID').value.trim();
    const spinner = document.getElementById('loading-spinner');
    
    if (input.length === 14 && /^\d+$/.test(input)) {
        if(spinner) spinner.style.display = 'block';
        try {
            const response = await fetch(`/api/patients`);
            if (!response.ok) throw new Error("السيرفر غير مستجيب");
            
            const result = await response.json();
            
            if (result.success) {
                const patient = result.data.find(p => p.nationalId === input);
                if (patient) {
                    localStorage.setItem('tempPatientData', JSON.stringify(patient));
                    window.location.href = "patient_report.html"; 
                } else {
                    showError("هذا الرقم القومي غير مسجل لدينا.");
                }
            }
        } catch (err) {
            showError("خطأ في الاتصال: تأكد من تشغيل السيرفر.");
            console.error(err);
        } finally {
            if(spinner) spinner.style.display = 'none';
        }
    } else {
        showError("يرجى إدخال 14 رقماً صحيحاً.");
    }
}

function showError(msg) {
    const errorPopup = document.getElementById('error-popup');
    const errorText = document.getElementById('error-message');
    if (errorPopup && errorText) {
        errorText.innerText = msg;
        errorPopup.style.display = 'block';
        // إغلاق تلقائي بعد 5 ثوانٍ
        setTimeout(closeError, 5000);
    }
}

function closeError() {
    const errorPopup = document.getElementById('error-popup');
    if(errorPopup) errorPopup.style.display = 'none';
}

// Event Listeners
window.addEventListener('resize', () => {
    if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});

document.getElementById('patientID').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') validateSearch();
});

// Start
initThree();
</script>
</body>
</html>
