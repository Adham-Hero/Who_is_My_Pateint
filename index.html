<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - النظام الطبي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #05080a; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            overflow: hidden; 
        }
        
        #bg-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
            width: 100%; 
            height: 100%; 
        }
        
        .login-card {
            background: rgba(11, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px;
            border: 1px solid rgba(13, 202, 240, 0.2);
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control { 
            background: rgba(0,0,0,0.4); 
            border: 1px solid #444; 
            color: #fff; 
            border-radius: 12px; 
            padding: 14px; 
            margin-bottom: 20px; 
            transition: 0.3s;
        }
        
        .form-control:focus { 
            background: rgba(0,0,0,0.6); 
            color: #fff; 
            border-color: #0dcaf0; 
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.3); 
        }
        
        .btn-login { 
            background: #0dcaf0; 
            border: none; 
            font-weight: bold; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            transition: 0.3s; 
            color: #000; 
            font-size: 1.1rem;
        }
        
        .btn-login:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(13, 202, 240, 0.4); 
            background: #0bb5d9;
        }

        .btn-login:disabled {
            background: #555;
            transform: none;
            cursor: not-allowed;
        }

        #message { min-height: 24px; font-weight: 500; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="login-card">
    <h2 class="text-info mb-2">🔐 تسجيل الدخول</h2>
    <p class="text-white-50 mb-4">نظام إدارة السجلات الطبية</p>
    
    <form id="loginForm">
        <input type="text" id="username" class="form-control" placeholder="اسم المستخدم" required autocomplete="username">
        <input type="password" id="password" class="form-control" placeholder="كلمة المرور" required autocomplete="current-password">
        <button type="submit" id="submitBtn" class="btn-login">دخول النظام</button>
    </form>
    
    <div id="message" class="mt-3 small text-danger"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 1. خلفية النجوم المتحركة ---
    let scene = new THREE.Scene(), 
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    let renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    let starGeo = new THREE.BufferGeometry(), posArr = new Float32Array(6000 * 3);
    for(let i=0; i<18000; i++) posArr[i] = (Math.random() - 0.5) * 12;
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.006, color: 0x0dcaf0 }));
    scene.add(stars); 
    camera.position.z = 3;

    function animate() { 
        requestAnimationFrame(animate); 
        stars.rotation.y += 0.0008; 
        stars.rotation.x += 0.0003; 
        renderer.render(scene, camera); 
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- 2. معالجة تسجيل الدخول (Fetch API) ---
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        
        // إعداد الحالة البصرية
        message.innerText = '';
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري التحقق...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            // ملاحظة: تم تعديل المسار ليتوافق مع السيرفر المعدل (/api/login)
            const res = await fetch('/api/index', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await res.json();

            if (res.ok && result.success) {
                // حفظ الدور في المتصفح لاستخدامه في الصفحات الأخرى
                localStorage.setItem('userRole', result.role);
                
                // التوجيه بناءً على الصلاحيات
                if (result.role === 'admin') {
                    window.location.href = 'Admin.html';
                } else {
                    window.location.href = 'User.html';
                }
            } else {
                message.innerText = result.message || 'خطأ في اسم المستخدم أو كلمة المرور';
                submitBtn.disabled = false;
                submitBtn.innerText = 'دخول النظام';
            }
        } catch (err) {
            message.innerText = '❌ تعذر الاتصال بالسيرفر، تأكد من اتصال الإنترنت';
            submitBtn.disabled = false;
            submitBtn.innerText = 'دخول النظام';
        }
    };
</script>
</body>
</html>
