<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - النظام الطبي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #05080a; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        
        .login-card {
            background: rgba(11, 15, 20, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(13, 202, 240, 0.2);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .form-control { background: rgba(0,0,0,0.4); border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 20px; text-align: center; }
        .form-control:focus { background: rgba(0,0,0,0.6); color: #fff; border-color: #0dcaf0; box-shadow: 0 0 15px rgba(13, 202, 240, 0.3); }
        
        .btn-login { background: #0dcaf0; border: none; font-weight: bold; width: 100%; padding: 12px; border-radius: 12px; transition: 0.3s; color: #000; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(13, 202, 240, 0.4); }
        
        .loading-spinner { display: none; width: 1.5rem; height: 1.5rem; border-width: 0.2em; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="login-card">
    <h2 class="text-info mb-4">🔐 تسجيل الدخول</h2>
    <form id="loginForm">
        <input type="text" id="username" class="form-control" placeholder="اسم المستخدم" required autocomplete="username">
        <input type="password" id="password" class="form-control" placeholder="كلمة المرور" required autocomplete="current-password">
        
        <button type="submit" id="submitBtn" class="btn-login">
            <span id="btnText">دخول النظام</span>
            <div id="spinner" class="spinner-border loading-spinner" role="status"></div>
        </button>
    </form>
    <div id="message" class="mt-3 small text-danger fw-bold"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- خلفية النجوم (Three.js) ---
    let scene = new THREE.Scene(), 
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    let renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    let starGeo = new THREE.BufferGeometry(), posArr = new Float32Array(5000 * 3);
    for(let i=0; i<15000; i++) posArr[i] = (Math.random() - 0.5) * 15;
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    
    let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.007, color: 0x0dcaf0, transparent: true, opacity: 0.8 }));
    scene.add(stars); 
    camera.position.z = 3;

    function animate() { 
        requestAnimationFrame(animate); 
        stars.rotation.y += 0.0008; 
        stars.rotation.x += 0.0002;
        renderer.render(scene, camera); 
    }
    animate();

    // تحديث الحجم عند تغيير حجم المتصفح
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- معالجة تسجيل الدخول (API) ---
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        // إظهار حالة التحميل
        message.innerText = "";
        btnText.style.display = "none";
        spinner.style.display = "inline-block";
        submitBtn.disabled = true;

        try {
            // استخدام رابط نسبي ليعمل على أي سيرفر (Vercel أو Localhost)
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await res.json();

            if (res.ok && result.success) {
                // حفظ البيانات في المتصفح لاستخدامها في الصفحات الأخرى
                localStorage.setItem('userRole', result.role);
                localStorage.setItem('username', username);

                // التوجيه بناءً على الدور
                if (result.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'User.html';
                }
            } else {
                message.innerText = result.message || 'خطأ في بيانات الدخول';
            }
        } catch (err) {
            message.innerText = 'تعذر الاتصال بالسيرفر، تأكد من تشغيل Node.js';
        } finally {
            // إعادة الزر لحالته الطبيعية
            btnText.style.display = "inline";
            spinner.style.display = "none";
            submitBtn.disabled = false;
        }
    };
</script>
</body>
</html>
